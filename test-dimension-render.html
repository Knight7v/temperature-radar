<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dimension Rendering</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .test-pass { background: #d4edda; color: #155724; }
        .test-fail { background: #f8d7da; color: #721c24; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        .fixed-left { position: sticky; left: 0; background: #fff; z-index: 1; }
        .date-header { text-align: center; }
        .date-header-day { font-size: 0.85rem; }
        .hot-night-indicator { position: absolute; top: 2px; right: 2px; font-size: 0.7rem; }
        .forecast-empty-state { text-align: center; padding: 2rem; color: #999; }
        .forecast-empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .adi-cell-outbreak { background: rgba(208, 2, 27, 0.3); }
        .adi-cell-action { background: rgba(245, 124, 0, 0.25); }
        .adi-cell-opportunity { background: rgba(245, 166, 35, 0.2); }
        .adi-cell-observe { background: rgba(74, 144, 226, 0.15); }
        .adi-cell-normal { background: rgba(102, 102, 102, 0.1); }
    </style>
</head>
<body>
    <h1>Test Dimension Rendering (Tasks 8, 9, 10)</h1>
    <div id="testResults"></div>

    <h2>1. Feels-Like Temperature View</h2>
    <table>
        <thead id="feelsLikeThead"></thead>
        <tbody id="feelsLikeTbody"></tbody>
    </table>

    <h2>2. ADI View</h2>
    <table>
        <thead id="adiThead"></thead>
        <tbody id="adiTbody"></tbody>
    </table>

    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script>
        const testResults = document.getElementById('testResults');

        function addResult(passed, message) {
            const div = document.createElement('div');
            div.className = 'test-result ' + (passed ? 'test-pass' : 'test-fail');
            div.textContent = (passed ? '✓ ' : '✗ ') + message;
            testResults.appendChild(div);
        }

        // Test 1: Check if functions are exported
        addResult(typeof UI.renderReportTemperature === 'function', 'renderReportTemperature is exported');
        addResult(typeof UI.renderReportFeelsLike === 'function', 'renderReportFeelsLike is exported');
        addResult(typeof UI.renderReportADI === 'function', 'renderReportADI is exported');

        // Mock data with all required fields
        const mockCities = [
            {
                cityName: '上海',
                region: '华东',
                province: '上海',
                adiScore: 78,
                level: 'action',
                maxTemp: 35,
                nightMinTemp: 28,
                feelsLike: 38,
                humidity: 75,
                continuousHotNightDays: 3,
                future7Days: [
                    { dayMax: 36, nightMin: 28, adiScore: 80, level: 'action', isHotNight: true, dayFeelsLike: 38, nightFeelsLike: 31 },
                    { dayMax: 37, nightMin: 29, adiScore: 82, level: 'outbreak', isHotNight: true, dayFeelsLike: 40, nightFeelsLike: 32 },
                    { dayMax: 35, nightMin: 27, adiScore: 75, level: 'action', isHotNight: true, dayFeelsLike: 37, nightFeelsLike: 30 },
                    { dayMax: 34, nightMin: 26, adiScore: 70, level: 'opportunity', isHotNight: false, dayFeelsLike: 35, nightFeelsLike: 28 },
                    { dayMax: 33, nightMin: 25, adiScore: 65, level: 'opportunity', isHotNight: false, dayFeelsLike: 34, nightFeelsLike: 26 },
                    { dayMax: 32, nightMin: 24, adiScore: 60, level: 'observe', isHotNight: false, dayFeelsLike: 33, nightFeelsLike: 25 },
                    { dayMax: 31, nightMin: 23, adiScore: 55, level: 'observe', isHotNight: false, dayFeelsLike: 32, nightFeelsLike: 24 }
                ]
            },
            {
                cityName: '北京',
                region: '华北',
                province: '北京',
                adiScore: 65,
                level: 'opportunity',
                maxTemp: 33,
                nightMinTemp: 24,
                feelsLike: 35,
                humidity: 50,
                continuousHotNightDays: 0,
                future7Days: [
                    { dayMax: 34, nightMin: 25, adiScore: 68, level: 'opportunity', isHotNight: false, dayFeelsLike: 35, nightFeelsLike: 26 },
                    { dayMax: 35, nightMin: 26, adiScore: 72, level: 'action', isHotNight: false, dayFeelsLike: 36, nightFeelsLike: 27 },
                    { dayMax: 36, nightMin: 27, adiScore: 76, level: 'action', isHotNight: true, dayFeelsLike: 37, nightFeelsLike: 28 },
                    { dayMax: 35, nightMin: 26, adiScore: 73, level: 'action', isHotNight: false, dayFeelsLike: 36, nightFeelsLike: 27 },
                    { dayMax: 34, nightMin: 25, adiScore: 68, level: 'opportunity', isHotNight: false, dayFeelsLike: 35, nightFeelsLike: 26 },
                    { dayMax: 32, nightMin: 23, adiScore: 60, level: 'observe', isHotNight: false, dayFeelsLike: 33, nightFeelsLike: 24 },
                    { dayMax: 30, nightMin: 22, adiScore: 55, level: 'observe', isHotNight: false, dayFeelsLike: 31, nightFeelsLike: 23 }
                ]
            }
        ];

        // Test 2: Render feels-like view
        try {
            UI.renderReportFeelsLike(mockCities, document.getElementById('feelsLikeThead'), document.getElementById('feelsLikeTbody'));
            const feelsLikeTbody = document.getElementById('feelsLikeTbody');
            addResult(feelsLikeTbody.innerHTML.includes('上海'), 'Feels-like view renders cities');
            addResult(feelsLikeTbody.innerHTML.includes('38°'), 'Feels-like view shows day temperatures');
            addResult(feelsLikeTbody.innerHTML.includes('31°'), 'Feels-like view shows night temperatures');
        } catch (e) {
            addResult(false, 'Feels-like rendering failed: ' + e.message);
        }

        // Test 3: Render ADI view
        try {
            UI.renderReportADI(mockCities, document.getElementById('adiThead'), document.getElementById('adiTbody'));
            const adiTbody = document.getElementById('adiTbody');
            addResult(adiTbody.innerHTML.includes('上海'), 'ADI view renders cities');
            addResult(adiTbody.innerHTML.includes('80'), 'ADI view shows ADI scores');
            addResult(adiTbody.innerHTML.includes('adi-cell-'), 'ADI view uses color classes');
        } catch (e) {
            addResult(false, 'ADI rendering failed: ' + e.message);
        }

        // Test 4: Empty state
        try {
            UI.renderReportFeelsLike([], document.getElementById('feelsLikeThead'), document.getElementById('feelsLikeTbody'));
            addResult(document.getElementById('feelsLikeTbody').innerHTML.includes('未找到匹配的城市'), 'Empty state displayed correctly');
        } catch (e) {
            addResult(false, 'Empty state test failed: ' + e.message);
        }

        console.log('All tests completed!');
    </script>
</body>
</html>
