<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>地图测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/china-geo.js"></script>
</head>
<body style="margin:0; background:#0a0e27;">
    <div id="map" style="width:100%; height:100vh;"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'));
        echarts.registerMap('china', window.CHINA_GEO_DATA);
        chart.setOption({
            geo: {
                map: 'china', roam: true,
                itemStyle: { areaColor: '#141b3d', borderColor: '#2a3558' },
                label: { show: true, color: '#8b9dc3', fontSize: 10 }
            },
            series: [{
                type: 'scatter', coordinateSystem: 'geo',
                data: [
                    { name: '北京', value: [116.46, 39.92, 85] },
                    { name: '上海', value: [121.48, 31.22, 78] },
                    { name: '广州', value: [113.23, 23.16, 90] }
                ],
                symbolSize: 15,
                itemStyle: { color: '#D0021B' }
            }]
        });
    </script>
</body>
</html>
