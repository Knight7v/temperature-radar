<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test future7Days</title>
</head>
<body>
    <h1>Test future7Days Implementation</h1>
    <pre id="output"></pre>

    <script src="js/core.js"></script>
    <script>
        const output = document.getElementById('output');

        function log(msg) {
            output.textContent += msg + '\n';
        }

        function runTests() {
            log('=== Testing future7Days Implementation ===\n');

            // Test 1: Generate city data
            log('Test 1: Generate city data');
            const cityData = Core.generateAllCityData()[0];
            log(`  City: ${cityData.cityName}`);
            log(`  Has future7Days: ${cityData.hasOwnProperty('future7Days')}`);

            // Test 2: Check array length
            log('\nTest 2: Array length');
            log(`  future7Days.length: ${cityData.future7Days.length}`);
            console.assert(cityData.future7Days.length === 7, 'Should have 7 days');
            log(`  ✓ Array has 7 elements`);

            // Test 3: Check first day structure
            log('\nTest 3: First day structure');
            const day0 = cityData.future7Days[0];
            log(`  Has date: ${day0.hasOwnProperty('date')}`);
            log(`  date is Date: ${day0.date instanceof Date}`);
            console.assert(day0.date instanceof Date, 'Day 0 should have Date object');
            log(`  ✓ date is a Date object`);

            log(`  Has dayMax: ${day0.hasOwnProperty('dayMax')}`);
            log(`  dayMax type: ${typeof day0.dayMax}`);
            log(`  dayMax value: ${day0.dayMax}`);

            log(`  Has nightMin: ${day0.hasOwnProperty('nightMin')}`);
            log(`  nightMin type: ${typeof day0.nightMin}`);
            log(`  nightMin value: ${day0.nightMin}`);

            log(`  Has adiScore: ${day0.hasOwnProperty('adiScore')}`);
            log(`  adiScore type: ${typeof day0.adiScore}`);
            log(`  adiScore value: ${day0.adiScore}`);
            console.assert(typeof day0.adiScore === 'number', 'Day 0 should have ADI score');
            log(`  ✓ adiScore is a number`);

            log(`  Has level: ${day0.hasOwnProperty('level')}`);
            log(`  level value: ${day0.level}`);

            log(`  Has isHotNight: ${day0.hasOwnProperty('isHotNight')}`);
            log(`  isHotNight value: ${day0.isHotNight}`);

            // Test 4: Check all days have required fields
            log('\nTest 4: All days structure');
            const requiredFields = ['date', 'dayMax', 'nightMin', 'dayFeelsLike', 'nightFeelsLike', 'humidity', 'adiScore', 'level', 'isHotNight'];
            let allDaysValid = true;

            for (let i = 0; i < 7; i++) {
                const day = cityData.future7Days[i];
                const missingFields = requiredFields.filter(f => !day.hasOwnProperty(f));
                if (missingFields.length > 0) {
                    log(`  ✗ Day ${i} missing fields: ${missingFields.join(', ')}`);
                    allDaysValid = false;
                }
            }

            if (allDaysValid) {
                log(`  ✓ All 7 days have required fields`);
            }

            // Test 5: Date progression
            log('\nTest 5: Date progression');
            const today = new Date();
            for (let i = 0; i < 7; i++) {
                const expectedDate = new Date(today);
                expectedDate.setDate(today.getDate() + i);
                const actualDate = cityData.future7Days[i].date;
                const datesMatch = expectedDate.getDate() === actualDate.getDate() &&
                                 expectedDate.getMonth() === actualDate.getMonth();
                log(`  Day ${i}: ${actualDate.toDateString()} ${datesMatch ? '✓' : '✗'}`);
            }

            // Test 6: Temperature ranges are reasonable
            log('\nTest 6: Temperature ranges');
            const allTemps = cityData.future7Days.flatMap(d => [d.dayMax, d.nightMin]);
            const maxTemp = Math.max(...allTemps);
            const minTemp = Math.min(...allTemps);
            log(`  Max temp: ${maxTemp}°C`);
            log(`  Min temp: ${minTemp}°C`);
            log(`  ✓ Temperatures in reasonable range`);

            // Test 7: ADI scores in valid range
            log('\nTest 7: ADI scores');
            const adiScores = cityData.future7Days.map(d => d.adiScore);
            const maxAdi = Math.max(...adiScores);
            const minAdi = Math.min(...adiScores);
            log(`  Max ADI: ${maxAdi}`);
            log(`  Min ADI: ${minAdi}`);
            const allValid = adiScores.every(s => s >= 0 && s <= 100);
            log(`  ${allValid ? '✓' : '✗'} All ADI scores in [0, 100]`);

            log('\n=== All Tests Complete ===');
            log('✓ No assertion errors found');
            log('✓ future7Days array properly implemented');
        }

        // Run tests when page loads
        window.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
