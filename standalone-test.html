<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图测试</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f5f5f5; }
        #china-map { width: 100%; height: 500px; background: white; border-radius: 8px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>地图组件测试</h1>
    <div id="status"></div>
    <div id="china-map"></div>

    <script src="assets/echarts.min.js"></script>
    <script src="js/china-geo.js"></script>
    <script>
        const statusDiv = document.getElementById('status');

        function addStatus(type, msg) {
            statusDiv.innerHTML += `<div class="status ${type}">${msg}</div>`;
        }

        // 检查 ECharts
        if (typeof echarts === 'undefined') {
            addStatus('error', '❌ ECharts 未加载');
        } else {
            addStatus('success', `✅ ECharts v${echarts.version} 已加载`);
        }

        // 检查地图数据
        if (typeof window.CHINA_GEO_DATA === 'undefined') {
            addStatus('error', '❌ 地图数据未加载');
        } else {
            const featureCount = window.CHINA_GEO_DATA.features?.length || 0;
            addStatus('success', `✅ 地图数据已加载 (${featureCount} 个区域)`);
        }

        // 初始化地图
        if (typeof echarts !== 'undefined' && typeof window.CHINA_GEO_DATA !== 'undefined') {
            try {
                const mapContainer = document.getElementById('china-map');
                echarts.registerMap('china', window.CHINA_GEO_DATA);
                const chart = echarts.init(mapContainer);

                const option = {
                    backgroundColor: '#ffffff',
                    geo: {
                        map: 'china',
                        roam: true,
                        itemStyle: {
                            areaColor: '#e0e0e0',
                            borderColor: '#999999',
                            borderWidth: 1
                        },
                        emphasis: {
                            itemStyle: {
                                areaColor: '#4A90E2'
                            }
                        },
                        label: {
                            show: false
                        }
                    },
                    series: [{
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: [
                            {name: '北京', value: [116.46, 39.92, 100]},
                            {name: '上海', value: [121.48, 31.22, 100]},
                            {name: '广州', value: [113.23, 23.16, 100]},
                            {name: '深圳', value: [114.07, 22.62, 100]}
                        ],
                        symbolSize: 15,
                        itemStyle: {
                            color: '#f44336',
                            shadowBlur: 10,
                            shadowColor: 'rgba(244, 67, 54, 0.5)'
                        }
                    }],
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}'
                    }
                };

                chart.setOption(option);
                addStatus('success', '✅ 地图渲染成功！');

                // 响应式
                window.addEventListener('resize', () => chart.resize());

            } catch (error) {
                addStatus('error', `❌ 地图初始化失败: ${error.message}`);
                console.error(error);
            }
        }

        addStatus('info', '📝 浏览器信息: ' + navigator.userAgent);
        addStatus('info', '🔗 协议: ' + window.location.protocol);
    </script>
</body>
</html>
